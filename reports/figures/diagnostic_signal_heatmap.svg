<text x="54" y="242" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#eef2f7">+8.5%p paired; CI 5.9% - 11.2%</text>
<rect x="514" y="124" width="430" height="140" rx="8" fill="#c49a2c"/>
